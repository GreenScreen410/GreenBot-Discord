name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync source to local deploy path
        run: |
          mkdir -p /home/ubuntu/GreenBot-Discord
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='logs' \
            --exclude='lavalink' \
            ./ /home/ubuntu/GreenBot-Discord/

      - name: Deploy with Docker Compose
        run: |
          cd /home/ubuntu/GreenBot-Discord
          docker compose down
          docker compose up -d --build

          # If the backup dump exists, restore it to the newly created postgres container
          if [ -f /home/ubuntu/greenbot_dump.sql ]; then
            echo "=== Found greenbot_dump.sql. Starting restore... ==="
            
            # Wait for postgres to be ready (up to 30s)
            for i in {1..30}; do
              if docker exec greenbot-postgres pg_isready -U greenbot -d greenbot_database; then
                break
              fi
              echo "Waiting for postgres to become ready..."
              sleep 1
            done

            # Restore the database
            cat /home/ubuntu/greenbot_dump.sql | docker exec -i greenbot-postgres psql -U greenbot -d greenbot_database
            
            # Move the dump file to prevent importing it again on subsequent deploys
            mv /home/ubuntu/greenbot_dump.sql /home/ubuntu/greenbot_dump.sql.imported
            echo "=== Restore completed! ==="
          fi
